# ============================================================================
# Hybrid RAG Engine — CI Pipeline
# ============================================================================
# Triggers on push/PR to main. Runs lint, type check, and tests.
# ============================================================================

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  GROQ_API_KEY: "ci_test_key_not_real"
  ENVIRONMENT: "testing"
  LOG_LEVEL: "WARNING"

jobs:
  lint:
    name: "🔍 Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  test:
    name: "🧪 Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Install project in editable mode
        run: pip install -e .

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not slow"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    name: "🐳 Docker Build Verification"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hybrid-rag-engine:ci .

      - name: Verify container starts
        run: |
          docker run --rm \
            -e GROQ_API_KEY=test_key \
            -e ENVIRONMENT=testing \
            hybrid-rag-engine:ci \
            python -c "from src.config import get_settings; print('Config loaded:', get_settings().environment)"
